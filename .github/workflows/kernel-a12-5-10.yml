name: 内核构建 - Android 12 (5.10)

# 适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # KernelSU 变体固定为 ReSukiSU
      kernelsu_branch:
        description: "KSU 分支 (main/builtin/自定义commit hash，留空使用默认)"
        required: false
        type: string
        default: ""
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      droidspaces:
        description: "Droidspaces 容器支持"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      add_zeromount:
        description: 'Add ZERoMount support (main)'
        required: false
        type: boolean
        default: false
      add_nomount:
        description: 'Add NoMount support'
        required: false
        type: boolean
        default: false
      add_nomountX:
        description: 'Add NoMount support (saved/old)'
        required: false
        type: boolean
        default: false
      add_hymofs:
        description: 'Enable support for HymoFS'
        required: false
        type: boolean
        default: false
      custom:
        description: "Custom kernel (AOSP)"
        required: false
        type: boolean
        default: false
      custom_name:
        description: "Custom kernel (AOSP) name"
        required: false
        type: choice
        options:
          - "UserXP"
          - "playground"
          - "EvoX"
          - "zylhdrXP"
        default: "zylhdrXP"
  workflow_call:
    inputs:
      # KernelSU 变体固定为 ReSukiSU
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      add_zeromount:
        required: false
        type: boolean
        default: false
      add_nomount:
        required: false
        type: boolean
        default: false
      add_nomountX:
        required: false
        type: boolean
        default: false
      add_hymofs:
        required: false
        type: boolean
        default: false
      custom:
        required: false
        type: boolean
        default: false
      custom_name:
        required: false
        type: string
        default: ""
      called_from_main:
        description: "是否从 main.yml 调用（内部使用）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a12-5-10:
    name: "5.10.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "236"
            os_patch_level: "2025-05"
            revision: "r1"
          #- sub_level: "246"
          #  os_patch_level: "2025-12"
          #  revision: "r1"
          #- sub_level: "X"
          #  os_patch_level: "lts"
          #  revision: "r1"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      revision: ${{ matrix.revision }}
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      add_zeromount: ${{ inputs.add_zeromount }}
      add_nomount: ${{ inputs.add_nomount }}
      add_nomountX: ${{ inputs.add_nomountX }}
      add_hymofs: ${{ inputs.add_hymofs }}
      custom: ${{ inputs.custom }}
      custom_name: ${{ inputs.custom_name }}

  # 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
